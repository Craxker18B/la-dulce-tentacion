{% extends "base.html" %}
{% block title %}Acceso administrador — La Dulce Tentación{% endblock %}
{% block content %}
<section class="login-wrap">
  <form method="post" class="login-card">
    <h1>🔐 Acceso <em>Admin</em></h1>
    <p>Área privada. Solo el administrador puede entrar al panel CRUD.</p>
    <label>Usuario administrador<input name="usuario" required placeholder="Usuario"></label>
    <label>Contraseña<input type="password" name="password" required placeholder="Contraseña"></label>
    <button class="btn-primary" type="submit">Ingresar al panel</button>
    <p class="small-note"><a href="{{ url_for('login') }}">Ir al login de clientes</a></p>
  </form>
</section>
{% endblock %}

{% extends "base.html" %}
{% block title %}Producto Admin{% endblock %}
{% block content %}
<section class="page-section narrow">
  <form method="post" class="panel-form">
    <h1>{{ 'Editar' if producto else 'Nuevo' }} producto</h1>
    <label>Nombre<input name="nombre" required value="{{ producto.nombre if producto else '' }}"></label>
    <label>Descripción<textarea name="descripcion" required>{{ producto.descripcion if producto else '' }}</textarea></label>
    <label>Precio<input name="precio" type="number" step="0.01" min="0" required value="{{ producto.precio if producto else '' }}"></label>
    <label>Imagen
      <select name="imagen">
        {% for img in ['torta-chocolate.svg','cupcakes.svg','cheesecake.svg','galletas.svg','macarons.svg','croissant.svg'] %}
        <option value="{{ img }}" {% if producto and producto.imagen==img %}selected{% endif %}>{{ img }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="check-label"><input type="checkbox" name="activo" value="1" {% if not producto or producto.activo %}checked{% endif %}> Producto activo</label>
    <button class="btn-primary" type="submit">Guardar</button>
    <a href="{{ url_for('admin_dashboard') }}">Cancelar</a>
  </form>
</section>
{% endblock %}

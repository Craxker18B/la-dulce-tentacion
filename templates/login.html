{% extends "base.html" %}
{% block title %}Iniciar sesión — La Dulce Tentación{% endblock %}
{% block content %}
<section class="login-wrap">
  <form method="post" class="login-card">
    <h1>🧁 Iniciar <em>sesión</em></h1>
    <p>Accede a tu cuenta para comprar en La Dulce Tentación.</p>
    <label>Correo electrónico<input type="email" name="correo" required placeholder="correo@ejemplo.com"></label>
    <label>Contraseña<input type="password" name="password" required placeholder="Tu contraseña"></label>
    <button class="btn-primary" type="submit">Ingresar</button>
    <p class="small-note">¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate aquí</a></p>
    <p class="small-note"><a href="{{ url_for('home') }}">Volver al inicio</a></p>
  </form>
</section>
{% endblock %}
